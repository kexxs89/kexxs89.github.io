name: Update WM results

on:
  # schedule:
  #   - cron: "7 */6 * * *" # every 6 hours at :07 — fallback only; primary triggering is via repository_dispatch from an external scheduler
  workflow_dispatch:
  repository_dispatch:
    types: [update-results] # triggered by an external scheduler for reliable timing

permissions:
  contents: write

concurrency:
  group: update-results
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Fetch & merge results
        run: node scripts/update-results.js
      - name: Commit if changed
        run: |
          if git diff --quiet -- tippspiel-state.json; then
            echo "No result changes."
          else
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add tippspiel-state.json
            git commit -m "chore: auto-update match results [skip ci]"
            git push
          fi
